server {
  listen 80;
  server_name niupi.mx-cj.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name niupi.mx-cj.com;

  root /www/wwwroot/niupi.mx-cj.com;
  index index.html;

  ssl_certificate /etc/letsencrypt/live/niupi.mx-cj.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/niupi.mx-cj.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_prefer_server_ciphers off;

  # Serve the immersive page at the canonical root URL without a browser redirect.
  location = / {
    rewrite ^ /references/example.html break;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
